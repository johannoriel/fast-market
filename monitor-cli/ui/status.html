<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Monitor Status</title>
    <style>
        :root {
            --bg: #1a1a2e;
            --bg-secondary: #16213e;
            --text: #eee;
            --text-dim: #888;
            --accent: #0f3460;
            --success: #4ade80;
            --border: #333;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: var(--bg);
            color: var(--text);
            margin: 0;
            padding: 20px;
        }
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
            padding-bottom: 10px;
            border-bottom: 1px solid var(--border);
        }
        h1 { margin: 0; font-size: 1.5rem; }
        .nav { display: flex; gap: 15px; }
        .nav a { color: var(--text-dim); text-decoration: none; }
        .nav a:hover, .nav a.active { color: var(--text); }
        .stats {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
            gap: 15px;
            margin-bottom: 20px;
        }
        .stat-card {
            background: var(--bg-secondary);
            padding: 15px;
            border-radius: 8px;
            text-align: center;
        }
        .stat-value { font-size: 2rem; font-weight: bold; }
        .stat-label { color: var(--text-dim); font-size: 0.9rem; }
        .section { margin-bottom: 30px; }
        .section h2 { font-size: 1.2rem; margin-bottom: 15px; }
        .item-list { display: flex; flex-direction: column; gap: 10px; }
        .item {
            background: var(--bg-secondary);
            padding: 12px;
            border-radius: 6px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .item-id { font-family: monospace; font-weight: bold; }
        .item-meta { color: var(--text-dim); font-size: 0.85rem; }
        .item-badge {
            padding: 4px 8px;
            border-radius: 4px;
            font-size: 0.8rem;
        }
        .item-badge.success { background: var(--success); color: #000; }
        .item-badge.error { background: #f87171; color: #000; }
        .loading { text-align: center; padding: 20px; color: var(--text-dim); }
        .empty { text-align: center; padding: 40px; color: var(--text-dim); }
    </style>
</head>
<body>
    <div class="header">
        <h1>Monitor Status</h1>
        <nav class="nav">
            <a href="/ui/logs">Logs</a>
            <a href="/ui/status" class="active">Status</a>
        </nav>
    </div>

    <div id="content">
        <div class="loading">Loading...</div>
    </div>

    <script>
        async function loadStatus() {
            const resp = await fetch('/api/status');
            const data = await resp.json();

            const stats = data.statistics;
            const content = document.getElementById('content');

            content.innerHTML = `
                <div class="stats">
                    <div class="stat-card">
                        <div class="stat-value">${stats.sources_count}</div>
                        <div class="stat-label">Sources</div>
                    </div>
                    <div class="stat-card">
                        <div class="stat-value">${stats.rules_count}</div>
                        <div class="stat-label">Rules</div>
                    </div>
                    <div class="stat-card">
                        <div class="stat-value">${stats.actions_count}</div>
                        <div class="stat-label">Actions</div>
                    </div>
                    <div class="stat-card">
                        <div class="stat-value">${stats.triggers_count}</div>
                        <div class="stat-label">Triggers</div>
                    </div>
                    <div class="stat-card">
                        <div class="stat-value" style="color: ${stats.failed_triggers_count > 0 ? '#f87171' : 'inherit'}">${stats.failed_triggers_count}</div>
                        <div class="stat-label">Failed</div>
                    </div>
                </div>

                ${data.sources.length ? `
                <div class="section">
                    <h2>Sources (${data.sources.length})</h2>
                    <div class="item-list">
                        ${data.sources.map(s => `
                            <div class="item">
                                <div>
                                    <div class="item-id">${s.id}</div>
                                    <div class="item-meta">${s.plugin} | ${s.origin}</div>
                                </div>
                                <div class="item-meta">
                                    ${s.last_check ? 'Last: ' + new Date(s.last_check).toLocaleDateString() : 'Never checked'}
                                </div>
                            </div>
                        `).join('')}
                    </div>
                </div>
                ` : ''}

                ${data.rules.length ? `
                <div class="section">
                    <h2>Rules (${data.rules.length})</h2>
                    <div class="item-list">
                        ${data.rules.map(r => `
                            <div class="item">
                                <div>
                                    <div class="item-id">${r.id}</div>
                                    <div class="item-meta">Actions: ${r.action_ids.join(', ')}</div>
                                </div>
                                <div class="item-meta">
                                    ${r.last_triggered_at ? 'Triggered: ' + new Date(r.last_triggered_at).toLocaleDateString() : 'Never triggered'}
                                </div>
                            </div>
                        `).join('')}
                    </div>
                </div>
                ` : ''}

                ${data.actions.length ? `
                <div class="section">
                    <h2>Actions (${data.actions.length})</h2>
                    <div class="item-list">
                        ${data.actions.map(a => `
                            <div class="item">
                                <div>
                                    <div class="item-id">${a.id}</div>
                                    <div class="item-meta">${a.last_run ? 'Last run: ' + new Date(a.last_run).toLocaleString() : 'Never run'}</div>
                                </div>
                                ${a.last_exit_code !== undefined ? `
                                    <span class="item-badge ${a.last_exit_code === 0 ? 'success' : 'error'}">exit ${a.last_exit_code}</span>
                                ` : ''}
                            </div>
                        `).join('')}
                    </div>
                </div>
                ` : ''}

                ${!data.sources.length && !data.rules.length && !data.actions.length ? `
                    <div class="empty">No configured sources, rules, or actions</div>
                ` : ''}
            `;
        }

        loadStatus();
    </script>
</body>
</html>
