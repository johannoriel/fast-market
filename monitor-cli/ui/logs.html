<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Monitor Logs</title>
    <style>
        :root {
            --bg: #1a1a2e;
            --bg-secondary: #16213e;
            --text: #eee;
            --text-dim: #888;
            --accent: #0f3460;
            --success: #4ade80;
            --error: #f87171;
            --warning: #fbbf24;
            --border: #333;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: var(--bg);
            color: var(--text);
            margin: 0;
            padding: 20px;
        }
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
            padding-bottom: 10px;
            border-bottom: 1px solid var(--border);
        }
        h1 { margin: 0; font-size: 1.5rem; }
        .nav { display: flex; gap: 15px; }
        .nav a { color: var(--text-dim); text-decoration: none; }
        .nav a:hover, .nav a.active { color: var(--text); }
        .controls {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
            margin-bottom: 20px;
            padding: 15px;
            background: var(--bg-secondary);
            border-radius: 8px;
        }
        input, select, button {
            padding: 8px 12px;
            background: var(--bg);
            border: 1px solid var(--border);
            color: var(--text);
            border-radius: 4px;
        }
        input[list] { min-width: 150px; }
        button { cursor: pointer; }
        button:hover { background: var(--accent); }
        .logs { display: flex; flex-direction: column; gap: 8px; }
        .log-entry {
            padding: 12px;
            background: var(--bg-secondary);
            border-radius: 6px;
            font-family: monospace;
            font-size: 0.9rem;
        }
        .log-entry.mismatch { border-left: 3px solid var(--warning); }
        .log-entry.success { border-left: 3px solid var(--success); }
        .log-entry.error { border-left: 3px solid var(--error); }
        .log-header { display: flex; justify-content: space-between; margin-bottom: 8px; }
        .timestamp { color: var(--text-dim); font-size: 0.8rem; }
        .exit-code { padding: 2px 6px; border-radius: 3px; font-size: 0.8rem; }
        .exit-code.success { background: var(--success); color: #000; }
        .exit-code.error { background: var(--error); color: #000; }
        .meta { color: var(--text-dim); font-size: 0.8rem; margin-top: 6px; }
        .title { display: block; margin-top: 6px; word-break: break-all; }
        .loading { text-align: center; padding: 20px; color: var(--text-dim); }
        .empty { text-align: center; padding: 40px; color: var(--text-dim); }
        
        /* Modal styles */
        .modal-overlay {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.7);
            z-index: 1000;
            justify-content: center;
            align-items: center;
        }
        .modal-overlay.active { display: flex; }
        .modal {
            background: var(--bg-secondary);
            border-radius: 8px;
            padding: 20px;
            max-width: 90%;
            max-height: 90%;
            overflow: auto;
            position: relative;
        }
        .modal-close {
            position: absolute;
            top: 10px;
            right: 10px;
            background: var(--accent);
            border: none;
            color: var(--text);
            padding: 8px 12px;
            border-radius: 4px;
            cursor: pointer;
        }
        .modal-close:hover { background: #1a4a80; }
        .modal h2 { margin-top: 0; margin-bottom: 15px; }
        .modal-section { margin-bottom: 20px; }
        .modal-section h3 { color: var(--text-dim); font-size: 0.9rem; margin-bottom: 8px; }
        .modal-meta { color: var(--text-dim); font-size: 0.85rem; line-height: 1.6; }
        .modal-meta span { margin-right: 15px; }
        .modal-output {
            background: var(--bg);
            padding: 12px;
            border-radius: 4px;
            font-family: monospace;
            font-size: 0.85rem;
            white-space: pre-wrap;
            max-height: 400px;
            overflow: auto;
        }
        .session-viewer {
            background: var(--bg);
            padding: 12px;
            border-radius: 4px;
            font-family: monospace;
            font-size: 0.85rem;
            white-space: pre-wrap;
            max-height: 500px;
            overflow: auto;
        }
        .session-loading { color: var(--text-dim); font-style: italic; }
        .session-not-found { color: var(--warning); font-style: italic; }
        .session-error { color: var(--error); font-style: italic; }
        .log-entry { cursor: pointer; transition: background 0.2s; }
        .log-entry:hover { background: #1e2a4a; }
    </style>
</head>
<body>
    <div class="header">
        <h1>Monitor Logs</h1>
        <nav class="nav">
            <a href="/ui/logs" class="active">Logs</a>
            <a href="/ui/status">Status</a>
            <a href="/ui/debug">Debug</a>
        </nav>
    </div>

    <div class="controls">
        <select id="filterType">
            <option value="triggers">Trigger Logs</option>
            <option value="mismatch">Mismatch Logs</option>
        </select>
        <input type="text" id="since" placeholder="since (e.g. 1d, 1h)" value="1d">
        <input type="text" id="ruleId" placeholder="rule ID" list="ruleIds">
        <datalist id="ruleIds"></datalist>
        <input type="text" id="sourceId" placeholder="source ID" list="sourceIds">
        <datalist id="sourceIds"></datalist>
        <input type="text" id="actionId" placeholder="action ID" list="actionIds">
        <datalist id="actionIds"></datalist>
        <input type="number" id="limit" value="50" min="1" max="500" style="width: 80px;">
        <button id="refresh">Refresh</button>
        <button id="follow">Follow</button>
    </div>

    <div id="logs" class="logs"></div>

    <!-- Modal for full log details -->
    <div id="logModal" class="modal-overlay">
        <div class="modal">
            <button class="modal-close" id="modalClose">✕</button>
            <h2>Log Details</h2>
            <div id="modalContent"></div>
        </div>
    </div>

    <script>
        const logsEl = document.getElementById('logs');
        const filterType = document.getElementById('filterType');
        const since = document.getElementById('since');
        const ruleId = document.getElementById('ruleId');
        const sourceId = document.getElementById('sourceId');
        const actionId = document.getElementById('actionId');
        const limit = document.getElementById('limit');
        const refreshBtn = document.getElementById('refresh');
        const followBtn = document.getElementById('follow');
        const ruleIdsList = document.getElementById('ruleIds');
        const sourceIdsList = document.getElementById('sourceIds');
        const actionIdsList = document.getElementById('actionIds');

        let following = false;
        let followInterval = null;

        async function fetchFilters() {
            const resp = await fetch('/api/filters');
            const data = await resp.json();
            
            ruleIdsList.innerHTML = data.rule_ids.map(id => `<option value="${id}">`).join('');
            sourceIdsList.innerHTML = data.source_ids.map(id => `<option value="${id}">`).join('');
            actionIdsList.innerHTML = data.action_ids.map(id => `<option value="${id}">`).join('');
        }

        async function fetchLogs() {
            const params = new URLSearchParams();
            if (since.value) params.set('since', since.value);
            if (ruleId.value) params.set('rule_id', ruleId.value);
            if (sourceId.value) params.set('source_id', sourceId.value);
            if (actionId.value) params.set('action_id', actionId.value);
            params.set('limit', limit.value);
            params.set('mismatch', filterType.value === 'mismatch' ? 'true' : 'false');

            const resp = await fetch('/api/logs?' + params);
            return await resp.json();
        }

        function renderLogs(logs) {
            if (!logs.length) {
                logsEl.innerHTML = '<div class="empty">No logs found</div>';
                return;
            }

            logsEl.innerHTML = logs.map(log => {
                const ts = new Date(log.triggered_at || log.evaluated_at);
                const isMismatch = log.failed_conditions !== undefined;
                const exitCode = log.exit_code;
                let exitClass = '';
                let borderClass = 'log-entry';
                if (isMismatch) {
                    borderClass += ' mismatch';
                } else if (exitCode === 0) {
                    borderClass += ' success';
                    exitClass = 'success';
                } else if (exitCode !== undefined && exitCode !== 0) {
                    borderClass += ' error';
                    exitClass = 'error';
                }

                return `
                    <div class="${borderClass}" data-log-id="${log.id}" data-is-mismatch="${isMismatch}">
                        <div class="log-header">
                            <span class="timestamp">${ts.toLocaleString()}</span>
                            ${!isMismatch && exitCode !== undefined ? `<span class="exit-code ${exitClass}">${exitCode}</span>` : ''}
                            ${isMismatch ? '<span class="exit-code" style="background: var(--warning); color: #000;">MISMATCH</span>' : ''}
                        </div>
                        <div class="meta">
                            rule=${log.rule_id} | source=${log.source_id}
                            ${log.action_id ? ' | action=' + log.action_id : ''}
                            ${log.item_id ? ` | <a href="/ui/debug?item_id=${log.item_id}&source_id=${log.source_id}" style="color: var(--warning);">item_id=${log.item_id}</a>` : ''}
                        </div>
                        <span class="title">${log.item_title}</span>
                        ${log.output ? `<pre style="margin: 8px 0 0 0; font-size: 0.8rem; color: var(--text-dim);">${log.output}</pre>` : ''}
                        ${log.failed_conditions ? `<div style="margin-top: 6px; font-size: 0.8rem; color: var(--warning);">Failed: ${JSON.stringify(log.failed_conditions)}</div>` : ''}
                    </div>
                `;
            }).join('');

            // Add click handlers to log entries
            document.querySelectorAll('.log-entry').forEach(entry => {
                entry.addEventListener('click', (e) => {
                    // Don't open modal if clicking on links
                    if (e.target.tagName === 'A') return;
                    const logId = entry.dataset.logId;
                    const isMismatch = entry.dataset.isMismatch === 'true';
                    openLogModal(logId, isMismatch);
                });
            });
        }

        async function load() {
            logsEl.innerHTML = '<div class="loading">Loading...</div>';
            try {
                const logs = await fetchLogs();
                renderLogs(logs);
            } catch (e) {
                logsEl.innerHTML = '<div class="empty">Error loading logs: ' + e.message + '</div>';
            }
        }

        // Modal functions
        const modal = document.getElementById('logModal');
        const modalContent = document.getElementById('modalContent');
        const modalClose = document.getElementById('modalClose');

        async function openLogModal(logId, isMismatch) {
            modal.classList.add('active');
            modalContent.innerHTML = '<div class="loading">Loading log details...</div>';

            try {
                // Fetch full log details
                const params = new URLSearchParams({ mismatch: isMismatch });
                const logResp = await fetch(`/api/logs/${logId}?${params}`);
                if (!logResp.ok) throw new Error('Failed to fetch log details');
                const log = await logResp.json();

                let html = `
                    <div class="modal-section">
                        <h3>Metadata</h3>
                        <div class="modal-meta">
                            <span><strong>Log ID:</strong> ${log.id}</span><br>
                            <span><strong>Rule:</strong> ${log.rule_id}</span>
                            <span><strong>Source:</strong> ${log.source_id}</span>
                            ${log.action_id ? `<span><strong>Action:</strong> ${log.action_id}</span>` : ''}
                            ${log.item_id ? `<span><strong>Item:</strong> ${log.item_id}</span>` : ''}<br>
                            <span><strong>Title:</strong> ${log.item_title}</span><br>
                            <span><strong>Time:</strong> ${new Date(log.triggered_at || log.evaluated_at).toLocaleString()}</span>
                            ${log.exit_code !== undefined ? `<span><strong>Exit Code:</strong> <span class="exit-code ${log.exit_code === 0 ? 'success' : 'error'}">${log.exit_code}</span></span>` : ''}
                            ${log.failed_conditions ? `<br><span><strong>Failed Conditions:</strong> <span style="color: var(--warning);">${JSON.stringify(log.failed_conditions)}</span></span>` : ''}
                        </div>
                    </div>
                `;

                if (log.item_url) {
                    html += `
                        <div class="modal-section">
                            <h3>Item URL</h3>
                            <div class="modal-meta"><a href="${log.item_url}" target="_blank" style="color: var(--warning);">${log.item_url}</a></div>
                        </div>
                    `;
                }

                if (log.item_extra) {
                    html += `
                        <div class="modal-section">
                            <h3>Item Extra Data</h3>
                            <pre class="modal-output">${JSON.stringify(log.item_extra, null, 2)}</pre>
                        </div>
                    `;
                }

                if (log.output) {
                    html += `
                        <div class="modal-section">
                            <h3>Output</h3>
                            <pre class="modal-output">${log.output}</pre>
                        </div>
                    `;
                }

                // Try to fetch session.yaml for trigger logs (not mismatch)
                if (!isMismatch) {
                    html += `
                        <div class="modal-section">
                            <h3>Session File</h3>
                            <div id="sessionViewer" class="session-viewer">
                                <div class="session-loading">Searching for session.yaml...</div>
                            </div>
                        </div>
                    `;
                    modalContent.innerHTML = html;

                    // Fetch session.yaml asynchronously
                    fetchSessionYaml(logId);
                } else {
                    modalContent.innerHTML = html;
                }

            } catch (e) {
                modalContent.innerHTML = `<div class="session-error">Error loading log details: ${e.message}</div>`;
            }
        }

        async function fetchSessionYaml(logId) {
            const sessionViewer = document.getElementById('sessionViewer');
            if (!sessionViewer) return;

            try {
                const sessionResp = await fetch(`/api/logs/${logId}/session`);
                const sessionData = await sessionResp.json();

                if (sessionData.found) {
                    sessionViewer.innerHTML = `<div style="margin-bottom: 8px; color: var(--text-dim);">Found: ${sessionData.path}</div><pre>${sessionData.content}</pre>`;
                } else {
                    sessionViewer.innerHTML = `<div class="session-not-found">Session file not found: ${sessionData.reason}</div>`;
                }
            } catch (e) {
                sessionViewer.innerHTML = `<div class="session-error">Error loading session file: ${e.message}</div>`;
            }
        }

        function closeModal() {
            modal.classList.remove('active');
        }

        modalClose.addEventListener('click', closeModal);
        modal.addEventListener('click', (e) => {
            if (e.target === modal) closeModal();
        });

        // Close modal on Escape key
        document.addEventListener('keydown', (e) => {
            if (e.key === 'Escape' && modal.classList.contains('active')) {
                closeModal();
            }
        });

        fetchFilters();
        load();

        refreshBtn.addEventListener('click', load);
        filterType.addEventListener('change', load);
        [since, ruleId, sourceId, actionId, limit].forEach(el => el.addEventListener('change', load));

        followBtn.addEventListener('click', () => {
            following = !following;
            followBtn.textContent = following ? 'Stop' : 'Follow';
            if (following) {
                load();
                followInterval = setInterval(load, 2000);
            } else {
                clearInterval(followInterval);
            }
        });
    </script>
</body>
</html>
