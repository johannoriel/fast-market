<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Status — Corpus Agent</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Syne:wght@700;800&display=swap');
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --bg: #0e0e0f; --surface: #18181a; --border: #2a2a2e;
    --accent: #c8f04a; --accent2: #4af0c8;
    --text: #e8e8e6; --muted: #6b6b70;
    --obsidian: #a78bfa; --youtube: #f87171;
  }
  body { background: var(--bg); color: var(--text); font-family: 'DM Mono', monospace; min-height: 100vh; }
  header {
    padding: 1.5rem 3rem; border-bottom: 1px solid var(--border);
    display: flex; align-items: center; gap: 1rem;
  }
  header a { color: var(--muted); text-decoration: none; font-size: 0.8rem; }
  header a:hover { color: var(--accent); }
  header h1 { font-family: 'Syne', sans-serif; font-size: 1.2rem; font-weight: 800; color: var(--accent); }
  .sep { color: var(--border); }
  main { padding: 3rem; max-width: 600px; }
  .stat-block { border: 1px solid var(--border); margin-bottom: 1px; padding: 1.5rem 2rem; background: var(--surface); }
  .stat-source { font-family: 'Syne', sans-serif; font-weight: 800; font-size: 1.1rem; margin-bottom: 0.5rem; }
  .stat-source.obsidian { color: var(--obsidian); }
  .stat-source.youtube  { color: var(--youtube); }
  .stat-num { font-size: 2.5rem; font-weight: 500; color: var(--accent); line-height: 1; }
  .stat-label { color: var(--muted); font-size: 0.75rem; margin-top: 0.25rem; }
  .loading { color: var(--muted); font-size: 0.85rem; }
</style>
</head>
<body>
<header>
  <a href="/ui">corpus-agent</a>
  <span class="sep">/</span>
  <h1>Status</h1>
</header>
<main id="main"><div class="loading">Loading…</div></main>
<script>
  fetch('/items?limit=1000')
    .then(r => r.json())
    .then(items => {
      const counts = {}, durations = {};
      items.forEach(i => {
        counts[i.source_plugin] = (counts[i.source_plugin] || 0) + 1;
        if (i.duration_seconds) durations[i.source_plugin] = (durations[i.source_plugin] || 0) + i.duration_seconds;
      });
      const main = document.getElementById('main');
      if (!Object.keys(counts).length) {
        main.innerHTML = '<div class="loading">No documents indexed yet — run corpus sync</div>';
        return;
      }
      main.innerHTML = Object.entries(counts).map(([src, n]) => {
        const dur = durations[src];
        let extra = '';
        if (dur) {
          const h = Math.floor(dur/3600), m = Math.floor((dur%3600)/60);
          extra = `<div class="stat-label">${h}h ${m}m total video</div>`;
        }
        return `<div class="stat-block">
          <div class="stat-source ${src}">${src}</div>
          <div class="stat-num">${n}</div>
          <div class="stat-label">documents indexed</div>
          ${extra}
        </div>`;
      }).join('');
    });
</script>
</body>
</html>
